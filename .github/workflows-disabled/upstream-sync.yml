name: Upstream Sync

# Coordinates this fork against two upstreams:
#   original-upstream: router-for-me/CLIProxyAPI
#   plus-upstream:     kaitranntt/CLIProxyAPIPlus
#
# The sync branch is built in dependency order:
#   fork/main -> latest original release -> latest Plus release -> safe Plus head delta
#
# Successful syncs are tagged from the original release base:
#   vX.Y.Z-unstableneutron.<n>
#   vX.Y.Z-prerelease.unstableneutron.<n>
#
# Outcomes:
#   1. Clean merge + build + test pass -> fast-forward main, create fork tag,
#      and dispatch release/docker workflows.
#   2. Conflicts, unsafe Plus head deltas, invariant failures, or gate failures
#      -> push the stable pending overlay branch, open/update a SINGLE tracking
#      issue or PR, then fail the run so blocked acceptance is visible.
#   3. workflow_dispatch by unstableneutron with force_pr=true -> open a PR
#      for manual review.

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Always open a PR instead of fast-forwarding/tagging'
        required: false
        default: 'false'
      force_rebuild:
        description: 'Create a new unstableneutron tag even if selected upstream refs are already represented'
        required: false
        default: 'false'

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRACKING_ISSUE_LABEL: upstream-sync-blocked
  PR_LABEL: upstream-sync
  ORIGINAL_REPOSITORY: router-for-me/CLIProxyAPI
  PLUS_REPOSITORY: kaitranntt/CLIProxyAPIPlus
  ORIGINAL_REMOTE: original-upstream
  PLUS_REMOTE: plus-upstream

jobs:
  sync:
    if: |
      github.repository == 'unstableneutron/CLIProxyAPIPlus' &&
      (github.event_name == 'schedule' || github.actor == 'unstableneutron')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "ccs-upstream-sync[bot]"
          git config user.email "ccs-upstream-sync@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Authorize PR creation
        id: auth
        run: |
          if [ "${GITHUB_REPOSITORY}" = "unstableneutron/CLIProxyAPIPlus" ] &&
             { [ "${GITHUB_EVENT_NAME}" = "schedule" ] || [ "${GITHUB_ACTOR}" = "unstableneutron" ]; }; then
            echo "can_create_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_create_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prune superseded sync PRs and stale branches
        if: steps.auth.outputs.can_create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          PENDING_BRANCH=$(.github/scripts/upstream-sync.sh pending-overlay-branch)
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("upstream-sync/")) | "\(.number) \(.headRefName)"' || true)
          if [ -n "${OPEN_PRS}" ]; then
            echo "${OPEN_PRS}" | while read -r NUM BRANCH; do
              [ -z "${NUM}" ] && continue
              [ "${BRANCH}" != "${PENDING_BRANCH}" ] || continue
              echo "[i] Superseding PR #${NUM} (branch ${BRANCH})"
              gh pr close "${NUM}" --repo "${{ github.repository }}" \
                --comment "Superseded by the stable pending overlay upstream-sync PR." || true
              if [ -n "${BRANCH}" ]; then
                git push origin --delete "${BRANCH}" 2>/dev/null || true
              fi
            done
          fi

          git ls-remote --heads origin 'upstream-sync/*' \
            | awk '{print $2}' \
            | sed 's|refs/heads/||' \
            | while read -r BR; do
                [ -z "${BR}" ] && continue
                [ "${BR}" != "${PENDING_BRANCH}" ] || continue
                echo "[i] Pruning orphan branch ${BR}"
                git push origin --delete "${BR}" 2>/dev/null || true
              done
          set -e

      - name: Add upstream remotes
        run: |
          git remote add "${ORIGINAL_REMOTE}" "https://github.com/${ORIGINAL_REPOSITORY}.git"
          git remote add "${PLUS_REMOTE}" "https://github.com/${PLUS_REPOSITORY}.git"

      - name: Select sync plan
        id: plan
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: .github/scripts/upstream-sync.sh plan

      - name: Close stale tracking issue when selected refs are synced
        if: steps.plan.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OPEN_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "${TRACKING_ISSUE_LABEL}" \
            --json number \
            --jq '.[].number' 2>/dev/null || true)
          for n in ${OPEN_ISSUES}; do
            echo "[i] Closing stale tracking issue #${n}."
            gh issue close "${n}" --repo "${{ github.repository }}" \
              --comment "Selected original and Plus upstream refs are already represented. Auto-closing." || true
          done
          set -e

      - name: Create sync branch
        if: steps.plan.outputs.has_changes == 'true'
        id: branch
        run: |
          BRANCH=$(.github/scripts/upstream-sync.sh pending-overlay-branch)
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          git checkout -B "${BRANCH}"

      - name: Merge original release base
        if: steps.plan.outputs.has_changes == 'true'
        id: merge_original
        run: .github/scripts/upstream-sync.sh merge-ref original "${{ steps.plan.outputs.original_head }}"

      - name: Merge Plus release overlay
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.merge_original.outputs.conflicts != 'true'
        id: merge_plus_tag
        run: .github/scripts/upstream-sync.sh merge-ref plus-tag "${{ steps.plan.outputs.plus_tag_head }}"

      - name: Merge safe Plus head delta
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.plus_head_included == 'true' &&
          steps.plan.outputs.plus_head != steps.plan.outputs.plus_tag_head &&
          steps.merge_original.outputs.conflicts != 'true' &&
          steps.merge_plus_tag.outputs.conflicts != 'true'
        id: merge_plus_head
        run: .github/scripts/upstream-sync.sh merge-ref plus-head "${{ steps.plan.outputs.plus_head }}"

      - name: Upload overlay-at-risk reports
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          (steps.merge_original.outputs.overlay_at_risk_report != '' ||
           steps.merge_plus_tag.outputs.overlay_at_risk_report != '' ||
           steps.merge_plus_head.outputs.overlay_at_risk_report != '')
        uses: actions/upload-artifact@v4
        with:
          name: upstream-sync-overlay-at-risk
          if-no-files-found: ignore
          path: |
            ${{ steps.merge_original.outputs.overlay_at_risk_report }}
            ${{ steps.merge_plus_tag.outputs.overlay_at_risk_report }}
            ${{ steps.merge_plus_head.outputs.overlay_at_risk_report }}

      - name: Set up Go
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Invariant gate
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          steps.merge_original.outputs.conflicts != 'true' &&
          steps.merge_plus_tag.outputs.conflicts != 'true' &&
          steps.merge_plus_head.outputs.conflicts != 'true'
        id: invariants
        continue-on-error: true
        run: |
          set +e
          INVARIANT_LOG=$(mktemp)
          .github/scripts/upstream-sync.sh check-invariants 2>&1 | tee "${INVARIANT_LOG}"
          INVARIANT_EXIT=${PIPESTATUS[0]}
          if [ "${INVARIANT_EXIT}" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'INVARIANT_TAIL<<EOF'
            tail -n 80 "${INVARIANT_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Symbol-survival gate
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          steps.merge_original.outputs.conflicts != 'true' &&
          steps.merge_plus_tag.outputs.conflicts != 'true' &&
          steps.merge_plus_head.outputs.conflicts != 'true'
        id: symbol_survival
        continue-on-error: true
        run: |
          set +e
          SYMBOL_LOG=$(mktemp)
          .github/scripts/upstream-sync.sh check-symbol-survival "${{ steps.plan.outputs.pre_sync_head }}" "${{ steps.plan.outputs.original_head }}" 2>&1 | tee "${SYMBOL_LOG}"
          SYMBOL_EXIT=${PIPESTATUS[0]}
          if [ "${SYMBOL_EXIT}" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'SYMBOL_SURVIVAL_TAIL<<EOF'
            tail -n 80 "${SYMBOL_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Record synced upstream versions
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.merge_original.outputs.conflicts != 'true' &&
          steps.merge_plus_tag.outputs.conflicts != 'true' &&
          steps.merge_plus_head.outputs.conflicts != 'true' &&
          steps.invariants.outputs.passed == 'true' &&
          steps.symbol_survival.outputs.passed == 'true'
        env:
          ORIGINAL_TAG: ${{ steps.plan.outputs.original_tag }}
          ORIGINAL_COMMIT: ${{ steps.plan.outputs.original_head }}
          PLUS_TAG: ${{ steps.plan.outputs.plus_tag }}
          PLUS_TAG_COMMIT: ${{ steps.plan.outputs.plus_tag_head }}
          PLUS_HEAD_COMMIT: ${{ steps.plan.outputs.plus_head }}
          PLUS_HEAD_INCLUDED: ${{ steps.plan.outputs.plus_head_included }}
        run: |
          .github/scripts/upstream-sync.sh record-state
          git add .ccs-fork-upstream.env
          git diff --cached --quiet || git commit -m "chore(upstream-sync): record upstream versions"

      - name: Build gate
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          steps.merge_original.outputs.conflicts != 'true' &&
          steps.merge_plus_tag.outputs.conflicts != 'true' &&
          steps.merge_plus_head.outputs.conflicts != 'true' &&
          steps.invariants.outputs.passed == 'true' &&
          steps.symbol_survival.outputs.passed == 'true'
        id: build
        continue-on-error: true
        run: |
          set +e
          BUILD_LOG=$(mktemp)
          go build -o test-output ./cmd/server 2>&1 | tee "${BUILD_LOG}"
          BUILD_EXIT=${PIPESTATUS[0]}
          rm -f test-output
          if [ "${BUILD_EXIT}" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'BUILD_TAIL<<EOF'
            tail -n 60 "${BUILD_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Diagnostic build gate
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          (steps.merge_original.outputs.conflicts == 'true' ||
           steps.merge_plus_tag.outputs.conflicts == 'true' ||
           steps.merge_plus_head.outputs.conflicts == 'true')
        id: diagnostic_build
        continue-on-error: true
        run: |
          set +e
          BUILD_LOG=$(mktemp)
          go build -o test-output ./cmd/server 2>&1 | tee "${BUILD_LOG}"
          BUILD_EXIT=${PIPESTATUS[0]}
          rm -f test-output
          if [ "${BUILD_EXIT}" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'BUILD_TAIL<<EOF'
            tail -n 60 "${BUILD_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Test gate
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          steps.build.outputs.passed == 'true'
        id: test
        continue-on-error: true
        run: |
          set +e
          TEST_LOG=$(mktemp)
          go test ./... -count=1 -timeout 10m 2>&1 | tee "${TEST_LOG}"
          TEST_EXIT=${PIPESTATUS[0]}
          if [ "${TEST_EXIT}" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'TEST_TAIL<<EOF'
            tail -n 60 "${TEST_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Diagnostic test gate
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          steps.diagnostic_build.outputs.passed == 'true'
        id: diagnostic_test
        continue-on-error: true
        run: |
          set +e
          TEST_LOG=$(mktemp)
          go test ./... -count=1 -timeout 10m 2>&1 | tee "${TEST_LOG}"
          TEST_EXIT=${PIPESTATUS[0]}
          if [ "${TEST_EXIT}" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'TEST_TAIL<<EOF'
            tail -n 60 "${TEST_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Push sync branch
        if: steps.plan.outputs.has_changes == 'true'
        run: git push --force-with-lease origin "${{ steps.branch.outputs.name }}"

      - name: Fast-forward main and tag fork release
        id: ffwd
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          steps.plan.outputs.blocked != 'true' &&
          steps.merge_original.outputs.conflicts != 'true' &&
          steps.merge_plus_tag.outputs.conflicts != 'true' &&
          steps.merge_plus_head.outputs.conflicts != 'true' &&
          steps.invariants.outputs.passed == 'true' &&
          steps.symbol_survival.outputs.passed == 'true' &&
          steps.build.outputs.passed == 'true' &&
          steps.test.outputs.passed == 'true' &&
          github.event.inputs.force_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORK_TAG="${{ steps.plan.outputs.next_fork_tag }}"
          git checkout main
          git merge --ff-only "${{ steps.branch.outputs.name }}"
          git push origin main
          git push origin --delete "${{ steps.branch.outputs.name }}" || true

          git tag -a "${FORK_TAG}" -m "CLIProxyAPIPlus ${FORK_TAG} (original ${{ steps.plan.outputs.original_tag }}, Plus ${{ steps.plan.outputs.plus_tag }})"
          git push origin "refs/tags/${FORK_TAG}"

          gh workflow run release.yaml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${FORK_TAG}" || true
          gh workflow run docker-image.yml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${FORK_TAG}" || true

          echo "fork_tag=${FORK_TAG}" >> "$GITHUB_OUTPUT"
          echo "did_ff=true" >> "$GITHUB_OUTPUT"
          echo "[OK] Synced original ${{ steps.plan.outputs.original_tag }} and Plus ${{ steps.plan.outputs.plus_tag }} as ${FORK_TAG}."

      - name: Close stale tracking issue (fast-forward succeeded)
        if: steps.ffwd.outputs.did_ff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OPEN_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "${TRACKING_ISSUE_LABEL}" \
            --json number \
            --jq '.[].number' 2>/dev/null || true)
          for n in ${OPEN_ISSUES}; do
            gh issue close "${n}" --repo "${{ github.repository }}" \
              --comment "Resolved by automated sync to original ${{ steps.plan.outputs.original_tag }} and Plus ${{ steps.plan.outputs.plus_tag }} as ${{ steps.ffwd.outputs.fork_tag }}." || true
          done
          set -e

      - name: Open PR (force_pr only — manual escape hatch)
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          github.event.inputs.force_pr == 'true' &&
          steps.auth.outputs.can_create_pr == 'true' &&
          startsWith(steps.branch.outputs.name, 'upstream-sync/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "${PR_LABEL}" \
            --color "1D76DB" \
            --description "Automated upstream sync PR." \
            --repo "${{ github.repository }}" 2>/dev/null || true

          TITLE="chore(upstream-sync): pending overlay for original ${{ steps.plan.outputs.original_tag }} and Plus ${{ steps.plan.outputs.plus_tag }}"
          # shellcheck disable=SC2016
          BODY=$(printf '## Upstream sync pending overlay\n\n- Original repository: `%s`\n- Original tag: `%s`\n- Original commit: `%s`\n- Plus repository: `%s`\n- Plus tag: `%s`\n- Plus tag commit: `%s`\n- Plus head commit: `%s`\n- Plus head included: `%s`\n- Unsafe Plus head paths: `%s`\n- Next fork tag after merge: `%s`\n\n### Conflict guidance\n\nDo not resolve by blanket `ours` or `theirs`. Preserve the newer original base, then reapply Plus/fork behavior intentionally. Plus untagged head deltas only auto-land when they touch Plus-owned paths.\n' \
            "${{ steps.plan.outputs.original_repository }}" \
            "${{ steps.plan.outputs.original_tag }}" \
            "${{ steps.plan.outputs.original_head }}" \
            "${{ steps.plan.outputs.plus_repository }}" \
            "${{ steps.plan.outputs.plus_tag }}" \
            "${{ steps.plan.outputs.plus_tag_head }}" \
            "${{ steps.plan.outputs.plus_head }}" \
            "${{ steps.plan.outputs.plus_head_included }}" \
            "${{ steps.plan.outputs.unsafe_plus_head_delta_paths }}" \
            "${{ steps.plan.outputs.next_fork_tag }}")
          set +e
          PR_NUM=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --head "${{ steps.branch.outputs.name }}" \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)
          if [ -n "${PR_NUM}" ]; then
            # shellcheck disable=SC2016
            OVERLAY_AT_RISK_SECTION=$(printf '## Overlay-at-risk report\n\nThese shared-hotspot fork overlay hunks were present before the blocked merge and must be reviewed before resolving the preview commit. Full diffs are uploaded as the `upstream-sync-overlay-at-risk` artifact when present.\n\n### Original merge\n%s\n\n### Plus release overlay\n%s\n\n### Plus head delta\n%s\n' \
              "${ORIGINAL_OVERLAY_AT_RISK_SUMMARY:-<none>}" \
              "${PLUS_TAG_OVERLAY_AT_RISK_SUMMARY:-<none>}" \
              "${PLUS_HEAD_OVERLAY_AT_RISK_SUMMARY:-<none>}")
            BODY="${BODY}

          ## Symbol-survival gate

          ${SYMBOL_SURVIVAL_TAIL:-<no symbol-survival log captured>}

          ${OVERLAY_AT_RISK_SECTION}"

            gh pr edit "${PR_NUM}" \
              --repo "${{ github.repository }}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              --add-label "${PR_LABEL}" 2>&1
            PR_EXIT=$?
          else
            # shellcheck disable=SC2016
            OVERLAY_AT_RISK_SECTION=$(printf '## Overlay-at-risk report\n\nThese shared-hotspot fork overlay hunks were present before the blocked merge and must be reviewed before resolving the preview commit. Full diffs are uploaded as the `upstream-sync-overlay-at-risk` artifact when present.\n\n### Original merge\n%s\n\n### Plus release overlay\n%s\n\n### Plus head delta\n%s\n' \
              "${ORIGINAL_OVERLAY_AT_RISK_SUMMARY:-<none>}" \
              "${PLUS_TAG_OVERLAY_AT_RISK_SUMMARY:-<none>}" \
              "${PLUS_HEAD_OVERLAY_AT_RISK_SUMMARY:-<none>}")
            BODY="${BODY}

          ## Symbol-survival gate

          ${SYMBOL_SURVIVAL_TAIL:-<no symbol-survival log captured>}

          ${OVERLAY_AT_RISK_SECTION}"

            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head "${{ steps.branch.outputs.name }}" \
              --title "${TITLE}" \
              --body "${BODY}" 2>&1)
            PR_EXIT=$?
            echo "${PR_URL}"
            PR_NUM=$(echo "${PR_URL}" | grep -oE '/pull/[0-9]+' | grep -oE '[0-9]+$' || true)
            if [ -n "${PR_NUM}" ]; then
              gh pr edit "${PR_NUM}" --repo "${{ github.repository }}" --add-label "${PR_LABEL}" 2>&1 || true
            fi
          fi
          set -e
          if [ "${PR_EXIT}" -ne 0 ]; then exit "${PR_EXIT}"; fi

      - name: Update tracking issue on conflicts or gate failure
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          github.event.inputs.force_pr != 'true' &&
          (steps.plan.outputs.blocked == 'true' ||
           steps.merge_original.outputs.conflicts == 'true' ||
           steps.merge_plus_tag.outputs.conflicts == 'true' ||
           steps.merge_plus_head.outputs.conflicts == 'true' ||
           steps.invariants.outputs.passed == 'false' ||
           steps.symbol_survival.outputs.passed == 'false' ||
           steps.build.outputs.passed == 'false' ||
           steps.test.outputs.passed == 'false')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAN_CREATE_PR: ${{ steps.auth.outputs.can_create_pr }}
        run: |
          set +e
          STATUS=""
          [ "${{ steps.plan.outputs.blocked }}" = "true" ] && STATUS="${STATUS}- :warning: Plan blocked: \`${{ steps.plan.outputs.block_reason }}\`\n"
          [ "${{ steps.merge_original.outputs.conflicts }}" = "true" ] && STATUS="${STATUS}- :warning: Original merge conflicts detected\n"
          [ "${{ steps.merge_plus_tag.outputs.conflicts }}" = "true" ] && STATUS="${STATUS}- :warning: Plus release overlay conflicts detected\n"
          [ "${{ steps.merge_plus_head.outputs.conflicts }}" = "true" ] && STATUS="${STATUS}- :warning: Plus head delta conflicts detected\n"
          [ "${{ steps.invariants.outputs.passed }}" = "false" ] && STATUS="${STATUS}- :x: Fork invariant check FAILED\n"
          [ "${{ steps.build.outputs.passed }}" = "false" ] && STATUS="${STATUS}- :x: \`go build -o test-output ./cmd/server\` FAILED\n"
          [ "${{ steps.test.outputs.passed }}" = "false" ] && STATUS="${STATUS}- :x: \`go test ./...\` FAILED\n"

          BRANCH="${{ steps.branch.outputs.name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH_URL="${{ github.server_url }}/${{ github.repository }}/tree/${BRANCH}"

          gh label create "${TRACKING_ISSUE_LABEL}" \
            --color "B60205" \
            --description "Automated upstream sync is blocked; needs maintainer attention." \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "${PR_LABEL}" \
            --color "1D76DB" \
            --description "Automated upstream sync PR." \
            --repo "${{ github.repository }}" 2>/dev/null || true

          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          # shellcheck disable=SC2016
          COMMENT_BODY=$(printf '**New pending overlay sync attempt** (%s)\n\n- Original repository: `%s`\n- Original tag: `%s`\n- Original commit: `%s`\n- Plus repository: `%s`\n- Plus tag: `%s`\n- Plus tag commit: `%s`\n- Plus head commit: `%s`\n- Plus head included: `%s`\n- Plus head delta paths: `%s`\n- Unsafe Plus head paths: `%s`\n- Intended fork tag: `%s`\n- Sync branch: [%s](%s)\n- Workflow run: %s\n\n### Gate status\n%b\n### Conflict files\n\n#### Original merge\n%s\n\n#### Plus release overlay\n%s\n\n#### Plus head delta\n%s\n\n### Resolution guidance\n\nDo not resolve conflicts by blanket `ours` or `theirs`. Preserve the newer original base, then reapply Plus/fork behavior intentionally. Treat Plus untagged head deltas as safe only when they touch Plus-owned paths.\n\n<details><summary>Invariant tail (last 80 lines)</summary>\n\n```\n%s\n```\n\n</details>\n\n<details><summary>Build tail (last 60 lines)</summary>\n\n```\n%s\n```\n\n</details>\n\n<details><summary>Test tail (last 60 lines)</summary>\n\n```\n%s\n```\n\n</details>\n' \
            "${NOW}" \
            "${{ steps.plan.outputs.original_repository }}" \
            "${{ steps.plan.outputs.original_tag }}" \
            "${{ steps.plan.outputs.original_head }}" \
            "${{ steps.plan.outputs.plus_repository }}" \
            "${{ steps.plan.outputs.plus_tag }}" \
            "${{ steps.plan.outputs.plus_tag_head }}" \
            "${{ steps.plan.outputs.plus_head }}" \
            "${{ steps.plan.outputs.plus_head_included }}" \
            "${{ steps.plan.outputs.plus_head_delta_paths }}" \
            "${{ steps.plan.outputs.unsafe_plus_head_delta_paths }}" \
            "${{ steps.plan.outputs.next_fork_tag }}" \
            "${BRANCH}" "${BRANCH_URL}" \
            "${RUN_URL}" \
            "${STATUS:-<no gate status captured>}" \
            "${ORIGINAL_CONFLICT_TABLE:-<none>}" \
            "${PLUS_TAG_CONFLICT_TABLE:-<none>}" \
            "${PLUS_HEAD_CONFLICT_TABLE:-<none>}" \
            "${INVARIANT_TAIL:-<no invariant log captured>}" \
            "${BUILD_TAIL:-<no build log captured>}" \
            "${TEST_TAIL:-<no test log captured>}")
          # shellcheck disable=SC2016
          OVERLAY_AT_RISK_SECTION=$(printf '## Overlay-at-risk report\n\nThese shared-hotspot fork overlay hunks were present before the blocked merge and must be reviewed before resolving the preview commit. Full diffs are uploaded as the `upstream-sync-overlay-at-risk` artifact when present.\n\n### Original merge\n%s\n\n### Plus release overlay\n%s\n\n### Plus head delta\n%s\n' \
            "${ORIGINAL_OVERLAY_AT_RISK_SUMMARY:-<none>}" \
            "${PLUS_TAG_OVERLAY_AT_RISK_SUMMARY:-<none>}" \
            "${PLUS_HEAD_OVERLAY_AT_RISK_SUMMARY:-<none>}")
          COMMENT_BODY="${COMMENT_BODY}

          ## Symbol-survival gate

          ${SYMBOL_SURVIVAL_TAIL:-<no symbol-survival log captured>}

          ${OVERLAY_AT_RISK_SECTION}"

          ISSUE_TITLE="upstream-sync pending overlay: original ${{ steps.plan.outputs.original_tag }} / Plus ${{ steps.plan.outputs.plus_tag }}"
          # shellcheck disable=SC2016
          INTRO=$(printf 'The automated sync from `%s` and `%s` cannot land cleanly. This pending overlay tracker is updated in place with the latest refs and gate output. **It will be auto-closed** once a sync run reaches `main` without intervention.\n\n### What to do\n1. Pull the latest sync branch listed in the most recent comment.\n2. Reproduce locally: `go build -o test-output ./cmd/server && rm test-output && go test ./...`.\n3. Resolve by ownership: original-owned keeps the newer original base; Plus-owned keeps compatible Plus behavior; fork-owned keeps our explicit fork changes; shared hotspots must be manually composed.\n4. Push the fix to `main`. The next scheduled run will close this tracker.\n\n---\n' "${ORIGINAL_REPOSITORY}" "${PLUS_REPOSITORY}")
          ISSUE_BODY="${INTRO}${COMMENT_BODY}"

          write_step_summary() {
            echo "[i] Writing blocked sync report to workflow summary."
            {
              echo "## Upstream sync pending overlay"
              echo
              printf '%s\n' "${ISSUE_BODY}"
            } >> "${GITHUB_STEP_SUMMARY}"
          }

          create_or_update_pr() {
            if [ "${CAN_CREATE_PR}" != "true" ]; then
              echo "[i] PR creation is disabled for this run; writing summary only."
              write_step_summary
              return 0
            fi
            case "${BRANCH}" in
              upstream-sync/*) ;;
              *)
                echo "::warning::Refusing to create PR for non-sync branch: ${BRANCH}"
                write_step_summary
                return 0
                ;;
            esac

            PR_NUM=$(gh pr list \
              --repo "${{ github.repository }}" \
              --state open \
              --head "${BRANCH}" \
              --json number \
              --jq '.[0].number' 2>/dev/null || true)
            if [ -n "${PR_NUM}" ]; then
              echo "[i] Updating existing sync PR #${PR_NUM}"
              gh pr edit "${PR_NUM}" \
                --repo "${{ github.repository }}" \
                --title "${ISSUE_TITLE}" \
                --body "${ISSUE_BODY}" \
                --add-label "${PR_LABEL}" 2>&1 || true
              gh pr comment "${PR_NUM}" \
                --repo "${{ github.repository }}" \
                --body "${COMMENT_BODY}" || write_step_summary
            else
              echo "[i] Creating sync PR because issues are unavailable"
              PR_URL=$(gh pr create \
                --repo "${{ github.repository }}" \
                --base main \
                --head "${BRANCH}" \
                --title "${ISSUE_TITLE}" \
                --body "${ISSUE_BODY}" 2>&1)
              PR_EXIT=$?
              echo "${PR_URL}"
              if [ ${PR_EXIT} -ne 0 ]; then
                echo "::warning::Could not create PR tracker; see workflow summary for blocked sync report."
                write_step_summary
                return 0
              fi
              PR_NUM=$(echo "${PR_URL}" | grep -oE '/pull/[0-9]+' | grep -oE '[0-9]+$' || true)
              if [ -n "${PR_NUM}" ]; then
                gh pr edit "${PR_NUM}" --repo "${{ github.repository }}" --add-label "${PR_LABEL}" 2>&1 || true
              fi
            fi
          }

          ISSUE_NUM=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "${TRACKING_ISSUE_LABEL}" \
            --json number \
            --jq '.[0].number' 2>/tmp/upstream-sync-issues.err)
          ISSUE_LIST_EXIT=$?

          if [ ${ISSUE_LIST_EXIT} -ne 0 ]; then
            echo "[i] Issues unavailable; falling back to PR tracker."
            cat /tmp/upstream-sync-issues.err || true
            create_or_update_pr
          elif [ -n "${ISSUE_NUM}" ]; then
            echo "[i] Updating existing tracking issue #${ISSUE_NUM}"
            gh issue comment "${ISSUE_NUM}" \
              --repo "${{ github.repository }}" \
              --body "${COMMENT_BODY}" || create_or_update_pr
          else
            echo "[i] Creating new tracking issue"
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${ISSUE_TITLE}" \
              --label "${TRACKING_ISSUE_LABEL}" \
              --assignee "${{ github.repository_owner }}" \
              --body "${ISSUE_BODY}" || create_or_update_pr
          fi
          set -e

      - name: Fail blocked sync outcome
        if: |
          steps.plan.outputs.has_changes == 'true' &&
          github.event.inputs.force_pr != 'true' &&
          (steps.plan.outputs.blocked == 'true' ||
           steps.merge_original.outputs.conflicts == 'true' ||
           steps.merge_plus_tag.outputs.conflicts == 'true' ||
           steps.merge_plus_head.outputs.conflicts == 'true' ||
           steps.invariants.outputs.passed == 'false' ||
           steps.symbol_survival.outputs.passed == 'false' ||
           steps.build.outputs.passed == 'false' ||
           steps.test.outputs.passed == 'false')
        run: |
          echo "::error::Upstream sync did not reach main/tag acceptance; pending overlay was reported for manual resolution."
          exit 1
