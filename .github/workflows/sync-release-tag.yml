name: Dispatch Existing Release Tag

# Manual recovery helper only. Automatic upstream sync/tag creation lives in
# upstream-sync.yml so validation, tagging, and downstream dispatch agree on
# the same <upstream-tag>-unstableneutron.N tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing fork tag to release, e.g. v7.1.21-unstableneutron.0'
        required: true
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: dispatch-release-tag-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tag exists
        run: |
          TAG="${{ inputs.tag }}"
          git fetch --force --tags
          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} does not exist in this repository." >&2
            exit 1
          fi

      - name: Dispatch release and Docker workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          gh workflow run release.yaml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${TAG}"
          gh workflow run docker-image.yml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${TAG}"
