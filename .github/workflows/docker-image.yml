name: docker-image

# Builds and publishes the multi-arch Docker image for CLIProxyAPIPlus.
# Publishes only this fork's GHCR image:
#   ghcr.io/unstableneutron/cli-proxy-api-plus:<tag>
#   ghcr.io/unstableneutron/cli-proxy-api-plus:latest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build, e.g. v7.1.21-unstableneutron.0'
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: CLIProxyAPI
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/cli-proxy-api-plus

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, cliproxy]
    steps:
      - name: Resolve build ref
        id: ref
        run: |
          REF="${{ inputs.tag }}"
          if [ -z "${REF}" ]; then REF="${GITHUB_REF_NAME}"; fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up QEMU (for arm64 emulation on x64 self-hosted runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: |
          GHCR_IMG="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          GHCR_IMG_LC="$(echo "${GHCR_IMG}" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_ref=${GHCR_IMG_LC}" >> "$GITHUB_OUTPUT"

      - name: Build metadata
        id: meta
        run: |
          VERSION="${{ steps.ref.outputs.ref }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
            echo "build_date=${BUILD_DATE}"
          } >> "$GITHUB_OUTPUT"

      - name: Build tag list
        id: tags
        env:
          GHCR_REF: ${{ steps.img.outputs.ghcr_ref }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          {
            echo "tags<<EOF"
            echo "${GHCR_REF}:${VERSION}"
            echo "${GHCR_REF}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Summary
        env:
          GHCR_REF: ${{ steps.img.outputs.ghcr_ref }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          {
            echo "## Published"
            echo "- \`${GHCR_REF}:${VERSION}\`"
            echo "- \`${GHCR_REF}:latest\`"
            echo
            echo "Pull: \`docker pull ${GHCR_REF}:${VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
