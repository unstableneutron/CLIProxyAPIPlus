name: docker-image

# Reusable checked publisher for one already-created fork tag. The caller owns
# promotion and tag creation; this workflow only builds that exact commit.

on:
  workflow_call:
    inputs:
      tag:
        description: Existing fork tag to publish
        required: true
        type: string
      expected_commit:
        description: Commit the tag and image must represent
        required: true
        type: string
      publish_latest:
        description: Also move the latest image tag to this manifest
        required: false
        default: false
        type: boolean
    outputs:
      image:
        description: Published GHCR image name
        value: ${{ jobs.publish.outputs.image }}
      image_digest:
        description: Published multi-platform manifest digest
        value: ${{ jobs.publish.outputs.image_digest }}
      platforms_json:
        description: JSON array of required published platforms
        value: ${{ jobs.publish.outputs.platforms_json }}
  workflow_dispatch:
    inputs:
      tag:
        description: Existing fork tag to publish
        required: true
        type: string
      expected_commit:
        description: Expected peeled tag commit; empty resolves from the tag
        required: false
        default: ''
        type: string
      publish_latest:
        description: Also move latest; true preserves legacy direct dispatch behavior
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/cli-proxy-api-plus

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Resolve and verify image identity
        id: identity
        env:
          EXPECTED_COMMIT_INPUT: ${{ inputs.expected_commit }}
          TAG: ${{ inputs.tag }}
        run: |
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          TAG_COMMIT="$(git rev-parse "refs/tags/${TAG}^{}")"
          EXPECTED_COMMIT="${EXPECTED_COMMIT_INPUT}"
          if [ -z "${EXPECTED_COMMIT}" ]; then
            EXPECTED_COMMIT="${TAG_COMMIT}"
          fi
          if [ "$(git rev-parse HEAD)" != "${EXPECTED_COMMIT}" ]; then
            echo "Checkout does not match expected commit ${EXPECTED_COMMIT}." >&2
            exit 1
          fi
          if [ "${TAG_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "Tag ${TAG} resolves to ${TAG_COMMIT}, expected ${EXPECTED_COMMIT}." >&2
            exit 1
          fi
          {
            echo "expected_commit=${EXPECTED_COMMIT}"
            echo "short_commit=$(git rev-parse --short=12 HEAD)"
            echo "build_date=$(git show -s --format=%cI HEAD)"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve image name
        id: image
        run: |
          IMAGE="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          echo "ref=${IMAGE,,}" >> "${GITHUB_OUTPUT}"

      # docker/setup-buildx-action v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      # docker/login-action v4.4.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform by digest
        id: push
        # docker/build-push-action v7.3.0
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ inputs.tag }}
            COMMIT=${{ steps.identity.outputs.short_commit }}
            BUILD_DATE=${{ steps.identity.outputs.build_date }}
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=cliproxy-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cliproxy-${{ matrix.arch }}

      - name: Export platform digest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      # actions/upload-artifact v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.publish.outputs.image }}
      image_digest: ${{ steps.publish.outputs.image_digest }}
      platforms_json: ${{ steps.publish.outputs.platforms_json }}
    steps:
      # docker/setup-buildx-action v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      # docker/login-action v4.4.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # actions/download-artifact v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Publish and verify multi-platform manifest
        id: publish
        env:
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
          TAG: ${{ inputs.tag }}
        run: |
          IMAGE="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          IMAGE="${IMAGE,,}"
          TAG_ARGS=(-t "${IMAGE}:${TAG}")
          if [ "${PUBLISH_LATEST}" = true ]; then
            TAG_ARGS+=(-t "${IMAGE}:latest")
          fi
          SOURCES=()
          while IFS= read -r DIGEST_FILE; do
            SOURCES+=("${IMAGE}@sha256:$(basename "${DIGEST_FILE}")")
          done < <(find "${RUNNER_TEMP}/digests" -type f -print | sort)
          if [ "${#SOURCES[@]}" -ne 2 ]; then
            echo "Expected two platform digests, found ${#SOURCES[@]}." >&2
            exit 1
          fi
          docker buildx imagetools create "${TAG_ARGS[@]}" "${SOURCES[@]}"
          INSPECT="$(docker buildx imagetools inspect "${IMAGE}:${TAG}")"
          IMAGE_DIGEST="$(awk '$1 == "Digest:" { print $2; exit }' <<< "${INSPECT}")"
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "Could not resolve published manifest digest." >&2
            exit 1
          fi
          for PLATFORM in linux/amd64 linux/arm64; do
            if ! grep -Eq "Platform:[[:space:]]+${PLATFORM}$" <<< "${INSPECT}"; then
              echo "Published manifest is missing ${PLATFORM}." >&2
              exit 1
            fi
          done
          if [ "${PUBLISH_LATEST}" = true ]; then
            LATEST_INSPECT="$(docker buildx imagetools inspect "${IMAGE}:latest")"
            LATEST_DIGEST="$(awk '$1 == "Digest:" { print $2; exit }' <<< "${LATEST_INSPECT}")"
            if [ "${LATEST_DIGEST}" != "${IMAGE_DIGEST}" ]; then
              echo "latest digest ${LATEST_DIGEST} does not match ${TAG} digest ${IMAGE_DIGEST}." >&2
              exit 1
            fi
          fi
          {
            echo "image=${IMAGE}"
            echo "image_digest=${IMAGE_DIGEST}"
            echo 'platforms_json=["linux/amd64","linux/arm64"]'
          } >> "${GITHUB_OUTPUT}"
