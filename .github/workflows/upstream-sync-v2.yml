name: Upstream Sync v2

# Candidate-first upstream synchronization. One exact plan is materialized,
# recorded, validated, and either retained for review or promoted unchanged.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Validate only or promote a passing candidate
        required: true
        default: shadow
        type: choice
        options: [shadow, promote]
      base_ref:
        description: Fork ref used as the candidate base
        required: true
        default: main
        type: string
      force_candidate:
        description: Build a candidate even when the selected refs are represented
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: upstream-sync-v2
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ORIGINAL_REMOTE: original-upstream
  ORIGINAL_REPOSITORY: router-for-me/CLIProxyAPI
  PLUS_REMOTE: plus-upstream
  PLUS_REPOSITORY: kaitranntt/CLIProxyAPIPlus
  SYNC_WORK_DIR: /tmp/upstream-sync-v2-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  candidate:
    if: >-
      github.repository == 'unstableneutron/CLIProxyAPIPlus' &&
      github.actor == 'unstableneutron' &&
      (inputs.mode != 'promote' || inputs.base_ref == 'main')
    runs-on: ubuntu-24.04
    outputs:
      acceptable: ${{ steps.result.outputs.acceptable }}
      base_fork_commit: ${{ steps.plan.outputs.base_fork_commit }}
      candidate_branch: ${{ steps.plan.outputs.candidate_branch }}
      candidate_sha: ${{ steps.result.outputs.candidate_sha }}
      expected_fork_tag: ${{ steps.plan.outputs.expected_fork_tag }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
      plan_fingerprint: ${{ steps.plan.outputs.plan_fingerprint }}
      sync_id: ${{ steps.plan.outputs.safe_sync_id }}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ inputs.base_ref }}

      - name: Configure candidate repository
        run: |
          git config user.name "cliproxy-upstream-sync[bot]"
          git config user.email "cliproxy-upstream-sync@users.noreply.github.com"
          git config merge.ours.driver true
          git remote add "${ORIGINAL_REMOTE}" "https://github.com/${ORIGINAL_REPOSITORY}.git"
          git remote add "${PLUS_REMOTE}" "https://github.com/${PLUS_REPOSITORY}.git"
          mkdir -p "${SYNC_WORK_DIR}/report"

      - name: Snapshot exact target refs
        id: plan
        env:
          FORCE_CANDIDATE: ${{ inputs.force_candidate }}
        run: |
          PLAN_FILE="${SYNC_WORK_DIR}/plan.out"
          STEP_OUTPUT="${GITHUB_OUTPUT}"
          FORCE_REBUILD="${FORCE_CANDIDATE}" GITHUB_OUTPUT="${PLAN_FILE}" \
            .github/scripts/upstream-sync.sh plan
          cat "${PLAN_FILE}" >> "${STEP_OUTPUT}"

      - name: Report represented target
        if: steps.plan.outputs.has_changes == 'false'
        env:
          EXPECTED_FORK_TAG: ${{ steps.plan.outputs.expected_fork_tag }}
          PLAN_FINGERPRINT: ${{ steps.plan.outputs.plan_fingerprint }}
        run: |
          {
            echo "## Upstream sync v2"
            echo
            echo "The exact target is already represented by \`${EXPECTED_FORK_TAG}\`."
            echo "Plan fingerprint: \`${PLAN_FINGERPRINT}\`."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify represented release receipt
        if: steps.plan.outputs.has_changes == 'false'
        env:
          EXPECTED_FORK_TAG: ${{ steps.plan.outputs.expected_fork_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ inputs.mode }}
        run: |
          RECEIPT_DIR="${SYNC_WORK_DIR}/represented-release"
          mkdir -p "${RECEIPT_DIR}"
          STATE_SYNC_ID="$(awk -F= '$1 == "SYNC_ID" { print $2; exit }' .ccs-fork-upstream.env)"
          STATE_FINGERPRINT="$(awk -F= '$1 == "PLAN_FINGERPRINT" { print $2; exit }' .ccs-fork-upstream.env)"
          set +e
          gh release download "${EXPECTED_FORK_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern upstream-sync-receipt.json \
            --dir "${RECEIPT_DIR}"
          DOWNLOAD_EXIT=$?
          set -e
          if [ -z "${STATE_SYNC_ID}" ] || \
             [ -z "${STATE_FINGERPRINT}" ] || \
             [ "${DOWNLOAD_EXIT}" -ne 0 ]; then
            if [ "${MODE}" = shadow ]; then
              echo "Legacy release without a v2 receipt; shadow verification made no changes." >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
            echo "Represented release lacks v2 state or upstream-sync-receipt.json." >&2
            exit 1
          fi
          .github/scripts/verify-upstream-release.sh \
            --tag "${EXPECTED_FORK_TAG}" \
            --expected-commit "$(git rev-parse HEAD)" \
            --expected-sync-id "${STATE_SYNC_ID}" \
            --expected-plan-fingerprint "${STATE_FINGERPRINT}" \
            --image ghcr.io/unstableneutron/cli-proxy-api-plus \
            --require-latest-parity true \
            --receipt "${RECEIPT_DIR}/verified-receipt.json"
          diff -u \
            <(jq -S 'del(.workflow_run_id)' "${RECEIPT_DIR}/upstream-sync-receipt.json") \
            <(jq -S 'del(.workflow_run_id)' "${RECEIPT_DIR}/verified-receipt.json")
          echo "Verified existing release receipt for ${EXPECTED_FORK_TAG}." >> "${GITHUB_STEP_SUMMARY}"

      - name: Materialize target-specific candidate
        id: materialize
        if: steps.plan.outputs.has_changes == 'true'
        run: |
          MATERIALIZE_FILE="${SYNC_WORK_DIR}/materialize.out"
          STEP_OUTPUT="${GITHUB_OUTPUT}"
          GITHUB_OUTPUT="${MATERIALIZE_FILE}" \
            .github/scripts/upstream-sync.sh materialize "${SYNC_WORK_DIR}/plan.out"
          cat "${MATERIALIZE_FILE}" >> "${SYNC_WORK_DIR}/plan.out"
          cat "${MATERIALIZE_FILE}" >> "${STEP_OUTPUT}"

      - name: Record candidate state
        if: steps.plan.outputs.has_changes == 'true'
        run: .github/scripts/upstream-sync.sh record-state "${SYNC_WORK_DIR}/plan.out"

      - name: Check source freshness
        id: freshness
        if: steps.plan.outputs.has_changes == 'true'
        env:
          ALLOW_FORK_BASE_DRIFT: ${{ inputs.mode == 'shadow' }}
        run: |
          FRESHNESS_FILE="${SYNC_WORK_DIR}/freshness.out"
          STEP_OUTPUT="${GITHUB_OUTPUT}"
          set +e
          UPSTREAM_SYNC_ALLOW_FORK_BASE_DRIFT="${ALLOW_FORK_BASE_DRIFT}" \
            GITHUB_OUTPUT="${FRESHNESS_FILE}" \
            .github/scripts/upstream-sync.sh check-freshness "${SYNC_WORK_DIR}/plan.out"
          FRESHNESS_EXIT=$?
          set -e
          cat "${FRESHNESS_FILE}" >> "${SYNC_WORK_DIR}/plan.out"
          cat "${FRESHNESS_FILE}" >> "${STEP_OUTPUT}"
          echo "exit_code=${FRESHNESS_EXIT}" >> "${STEP_OUTPUT}"

      - name: Report path provenance
        id: provenance
        if: steps.plan.outputs.has_changes == 'true'
        run: |
          PROVENANCE_OUTPUT="${SYNC_WORK_DIR}/provenance.out"
          STEP_OUTPUT="${GITHUB_OUTPUT}"
          UPSTREAM_SYNC_REPORT_DIR="${SYNC_WORK_DIR}/report" \
            GITHUB_OUTPUT="${PROVENANCE_OUTPUT}" \
            .github/scripts/upstream-sync.sh report-provenance "${SYNC_WORK_DIR}/plan.out" HEAD
          cat "${PROVENANCE_OUTPUT}" >> "${STEP_OUTPUT}"

      # actions/setup-go v6.5.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        if: steps.plan.outputs.has_changes == 'true'
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run the single full validation pass
        id: validation
        if: steps.plan.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          UPSTREAM_SYNC_TOOLING_MODE: always
        run: .github/scripts/validate-upstream-sync.sh --mode full --plan "${SYNC_WORK_DIR}/plan.out" --report-dir "${SYNC_WORK_DIR}/report"

      - name: Render candidate report
        if: always() && steps.plan.outputs.has_changes == 'true'
        env:
          UPSTREAM_SYNC_WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          .github/scripts/render-upstream-sync-report.sh \
            --plan "${SYNC_WORK_DIR}/plan.out" \
            --validation "${SYNC_WORK_DIR}/report/validation.env" \
            --provenance "${SYNC_WORK_DIR}/report/provenance.tsv" \
            --output "${SYNC_WORK_DIR}/report/candidate.md"

      - name: Classify candidate result
        id: result
        if: always() && steps.plan.outputs.has_changes == 'true'
        env:
          BLOCKED: ${{ steps.plan.outputs.blocked }}
          CONFLICTS: ${{ steps.materialize.outputs.conflicts }}
          FRESH: ${{ steps.freshness.outputs.fresh }}
          MANUAL_COMPOSITION: ${{ steps.provenance.outputs.manual_composition_required }}
        run: |
          VALIDATION_STATUS="$(awk -F= '$1 == "OVERALL_STATUS" { print $2; exit }' "${SYNC_WORK_DIR}/report/validation.env")"
          CANDIDATE_SHA="$(git rev-parse HEAD)"
          ACCEPTABLE=false
          if [ "${BLOCKED}" != true ] && \
             [ "${CONFLICTS}" != true ] && \
             [ "${FRESH}" = true ] && \
             [ "${MANUAL_COMPOSITION}" != true ] && \
             [ "${VALIDATION_STATUS}" = passed ]; then
            ACCEPTABLE=true
          fi
          {
            echo "acceptable=${ACCEPTABLE}"
            echo "candidate_sha=${CANDIDATE_SHA}"
            echo "validation_status=${VALIDATION_STATUS}"
          } >> "${GITHUB_OUTPUT}"
          cat "${SYNC_WORK_DIR}/report/candidate.md" >> "${GITHUB_STEP_SUMMARY}"

      - name: Publish candidate branch with a fingerprint lease
        if: always() && steps.plan.outputs.has_changes == 'true' && steps.result.outputs.candidate_sha != ''
        env:
          BRANCH: ${{ steps.plan.outputs.candidate_branch }}
          PLAN_FINGERPRINT: ${{ steps.plan.outputs.plan_fingerprint }}
        run: |
          REMOTE_SHA="$(git ls-remote --heads origin "refs/heads/${BRANCH}" | awk '{ print $1; exit }')"
          if [ -n "${REMOTE_SHA}" ]; then
            git fetch --quiet origin "refs/heads/${BRANCH}:refs/upstream-sync-existing/${GITHUB_RUN_ID}"
            REMOTE_FINGERPRINT="$(git show "${REMOTE_SHA}:.ccs-fork-upstream.env" | awk -F= '$1 == "PLAN_FINGERPRINT" { print $2; exit }')"
            if [ "${REMOTE_FINGERPRINT}" != "${PLAN_FINGERPRINT}" ]; then
              echo "Remote candidate ${BRANCH} has a different plan fingerprint." >&2
              exit 1
            fi
          fi
          git push \
            "--force-with-lease=refs/heads/${BRANCH}:${REMOTE_SHA}" \
            origin "HEAD:refs/heads/${BRANCH}"

      - name: Open or update blocked candidate PR
        if: always() && inputs.mode == 'promote' && steps.plan.outputs.has_changes == 'true' && steps.result.outputs.acceptable != 'true'
        env:
          BRANCH: ${{ steps.plan.outputs.candidate_branch }}
          EXPECTED_FORK_TAG: ${{ steps.plan.outputs.expected_fork_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [ -n "${PR_NUMBER}" ]; then
            gh pr edit "${PR_NUMBER}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body-file "${SYNC_WORK_DIR}/report/candidate.md"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${BRANCH}" \
              --title "Resolve upstream sync ${EXPECTED_FORK_TAG}" \
              --body-file "${SYNC_WORK_DIR}/report/candidate.md"
          fi

      # actions/upload-artifact v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always() && steps.plan.outputs.has_changes == 'true'
        with:
          name: upstream-sync-v2-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.SYNC_WORK_DIR }}
          if-no-files-found: error
          retention-days: 14

      - name: Reject unpromotable candidate
        if: always() && steps.plan.outputs.has_changes == 'true' && steps.result.outputs.acceptable != 'true'
        run: |
          echo "The candidate is blocked, stale, conflicting, manually composed, or failed validation." >&2
          exit 1

  promote:
    needs: candidate
    if: inputs.mode == 'promote' && needs.candidate.outputs.has_changes == 'true' && needs.candidate.outputs.acceptable == 'true'
    runs-on: ubuntu-24.04
    outputs:
      commit: ${{ steps.tag.outputs.commit }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ needs.candidate.outputs.candidate_branch }}

      # actions/download-artifact v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: upstream-sync-v2-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.SYNC_WORK_DIR }}

      - name: Configure promotion repository
        run: |
          git remote add "${ORIGINAL_REMOTE}" "https://github.com/${ORIGINAL_REPOSITORY}.git"
          git remote add "${PLUS_REMOTE}" "https://github.com/${PLUS_REPOSITORY}.git"

      - name: Verify candidate and main identities
        id: identity
        env:
          BASE_FORK_COMMIT: ${{ needs.candidate.outputs.base_fork_commit }}
          CANDIDATE_SHA: ${{ needs.candidate.outputs.candidate_sha }}
          PLAN_FINGERPRINT: ${{ needs.candidate.outputs.plan_fingerprint }}
        run: |
          if [ "$(git rev-parse HEAD)" != "${CANDIDATE_SHA}" ]; then
            echo "Checked-out candidate does not match validated SHA ${CANDIDATE_SHA}." >&2
            exit 1
          fi
          STATE_FINGERPRINT="$(awk -F= '$1 == "PLAN_FINGERPRINT" { print $2; exit }' .ccs-fork-upstream.env)"
          if [ "${STATE_FINGERPRINT}" != "${PLAN_FINGERPRINT}" ]; then
            echo "Candidate state fingerprint does not match the validated plan." >&2
            exit 1
          fi
          git fetch --quiet origin main
          MAIN_SHA="$(git rev-parse origin/main)"
          if [ "${MAIN_SHA}" = "${BASE_FORK_COMMIT}" ]; then
            MAIN_STATE=base
          elif [ "${MAIN_SHA}" = "${CANDIDATE_SHA}" ]; then
            MAIN_STATE=candidate
          else
            echo "origin/main moved to ${MAIN_SHA}; expected ${BASE_FORK_COMMIT} or retry candidate ${CANDIDATE_SHA}." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${BASE_FORK_COMMIT}" "${CANDIDATE_SHA}"; then
            echo "Validated candidate is not descended from its planned fork base." >&2
            exit 1
          fi
          echo "main_state=${MAIN_STATE}" >> "${GITHUB_OUTPUT}"

      - name: Recheck exact source freshness
        env:
          ALLOW_FORK_BASE_DRIFT: ${{ steps.identity.outputs.main_state == 'candidate' }}
        run: |
          UPSTREAM_SYNC_ALLOW_FORK_BASE_DRIFT="${ALLOW_FORK_BASE_DRIFT}" \
            .github/scripts/upstream-sync.sh check-freshness "${SYNC_WORK_DIR}/plan.out"

      - name: Fast-forward accepted candidate to main
        if: steps.identity.outputs.main_state == 'base'
        run: git push origin HEAD:main

      - name: Create or verify accepted tag
        id: tag
        env:
          CANDIDATE_SHA: ${{ needs.candidate.outputs.candidate_sha }}
          TAG: ${{ needs.candidate.outputs.expected_fork_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
            TAG_COMMIT="$(git rev-parse "refs/tags/${TAG}^{}")"
            if [ "${TAG_COMMIT}" != "${CANDIDATE_SHA}" ]; then
              echo "Existing tag ${TAG} resolves to ${TAG_COMMIT}, expected ${CANDIDATE_SHA}." >&2
              exit 1
            fi
          else
            git tag -a "${TAG}" "${CANDIDATE_SHA}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
          fi
          {
            echo "commit=${CANDIDATE_SHA}"
            echo "tag=${TAG}"
          } >> "${GITHUB_OUTPUT}"

  release:
    needs: promote
    if: needs.promote.result == 'success'
    uses: ./.github/workflows/release.yaml
    with:
      tag: ${{ needs.promote.outputs.tag }}
      expected_commit: ${{ needs.promote.outputs.commit }}
    secrets: inherit

  docker:
    needs: [promote, release]
    if: needs.promote.result == 'success' && needs.release.result == 'success'
    uses: ./.github/workflows/docker-image.yml
    with:
      tag: ${{ needs.promote.outputs.tag }}
      expected_commit: ${{ needs.promote.outputs.commit }}
      publish_latest: true
    secrets: inherit

  verify:
    needs: [candidate, promote, release, docker]
    if: needs.promote.result == 'success' && needs.release.result == 'success' && needs.docker.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ needs.promote.outputs.commit }}

      - name: Verify release, image, and promoted identity
        env:
          EXPECTED_COMMIT: ${{ needs.promote.outputs.commit }}
          EXPECTED_IMAGE_DIGEST: ${{ needs.docker.outputs.image_digest }}
          EXPECTED_PLAN_FINGERPRINT: ${{ needs.candidate.outputs.plan_fingerprint }}
          EXPECTED_SYNC_ID: ${{ needs.candidate.outputs.sync_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ needs.docker.outputs.image }}
          TAG: ${{ needs.promote.outputs.tag }}
        run: |
          .github/scripts/verify-upstream-release.sh \
            --tag "${TAG}" \
            --expected-commit "${EXPECTED_COMMIT}" \
            --expected-sync-id "${EXPECTED_SYNC_ID}" \
            --expected-plan-fingerprint "${EXPECTED_PLAN_FINGERPRINT}" \
            --image "${IMAGE}" \
            --require-latest-parity true \
            --receipt upstream-sync-receipt.json
          RECEIPT_DIGEST="$(jq -r '.image_digest' upstream-sync-receipt.json)"
          if [ "${RECEIPT_DIGEST}" != "${EXPECTED_IMAGE_DIGEST}" ]; then
            echo "Verified digest ${RECEIPT_DIGEST} does not match publisher output ${EXPECTED_IMAGE_DIGEST}." >&2
            exit 1
          fi

      - name: Attach receipt to the verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.promote.outputs.tag }}
        run: |
          gh release upload "${TAG}" upstream-sync-receipt.json \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
          gh release view "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' \
            | grep -Fx upstream-sync-receipt.json

      # actions/upload-artifact v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: upstream-sync-receipt-${{ github.run_id }}-${{ github.run_attempt }}
          path: upstream-sync-receipt.json
          if-no-files-found: error
          retention-days: 90
