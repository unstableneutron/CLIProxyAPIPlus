name: Upstream Sync

# Pulls daily changes from router-for-me/CLIProxyAPI into this fork.
# Plus-only provider dirs are shielded via .gitattributes (merge=ours).
# If the merge is clean AND build passes, push directly to main.
# Otherwise, open a PR for manual review.

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Always open a PR even on clean merge'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "ccs-upstream-sync[bot]"
          git config user.email "ccs-upstream-sync@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM_MERGE_BASE=$(git merge-base HEAD upstream/main || echo "none")
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          echo "local=${LOCAL}" >> $GITHUB_OUTPUT
          echo "upstream_head=${UPSTREAM_HEAD}" >> $GITHUB_OUTPUT
          echo "merge_base=${UPSTREAM_MERGE_BASE}" >> $GITHUB_OUTPUT
          if [ "${UPSTREAM_HEAD}" = "${UPSTREAM_MERGE_BASE}" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "[i] Fork already contains all upstream commits; nothing to sync."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "[i] New upstream commits to sync:"
            git log --oneline "${UPSTREAM_MERGE_BASE}..upstream/main" | head -20
          fi

      - name: Create sync branch
        if: steps.check.outputs.has_changes == 'true'
        id: branch
        run: |
          BRANCH="upstream-sync/$(date -u +%Y%m%d-%H%M)"
          echo "name=${BRANCH}" >> $GITHUB_OUTPUT
          git checkout -b "${BRANCH}"

      - name: Merge upstream (prefer upstream, respect .gitattributes merge=ours)
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        continue-on-error: true
        run: |
          set +e
          git merge --no-edit -X theirs upstream/main
          MERGE_EXIT=$?
          if [ $MERGE_EXIT -ne 0 ]; then
            echo "conflicts=true" >> $GITHUB_OUTPUT
            echo "[!] Merge conflicts detected:"
            git status --short | grep -E '^(UU|AA|DD|AU|UA|UD|DU)' || true
            # Leave repo in conflicted state for PR body to capture
          else
            echo "conflicts=false" >> $GITHUB_OUTPUT
            echo "[OK] Clean merge."
          fi
          set -e

      - name: Abort if conflicts
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.conflicts == 'true'
        run: |
          # Collect conflict list for PR body
          git diff --name-only --diff-filter=U > /tmp/conflicts.txt || true
          git merge --abort
          echo "CONFLICT_FILES<<EOF" >> $GITHUB_ENV
          cat /tmp/conflicts.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          # Redo merge with conflict markers preserved so the PR shows the state
          git merge --no-edit -X theirs upstream/main || true

      - name: Set up Go
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.conflicts == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.26.0'
          cache: true

      - name: Build gate
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.conflicts == 'false'
        id: build
        continue-on-error: true
        run: |
          set +e
          go build ./...
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi
          set -e

      - name: Test gate
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.conflicts == 'false' && steps.build.outputs.passed == 'true'
        id: test
        continue-on-error: true
        run: |
          set +e
          go test ./... -count=1 -timeout 10m
          TEST_EXIT=$?
          if [ $TEST_EXIT -ne 0 ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi
          set -e

      - name: Push sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Fast-forward main (clean merge + build + test pass, no force-pr)
        if: |
          steps.check.outputs.has_changes == 'true' &&
          steps.merge.outputs.conflicts == 'false' &&
          steps.build.outputs.passed == 'true' &&
          steps.test.outputs.passed == 'true' &&
          github.event.inputs.force_pr != 'true'
        run: |
          git checkout main
          git merge --ff-only "${{ steps.branch.outputs.name }}"
          git push origin main
          git push origin --delete "${{ steps.branch.outputs.name }}"
          echo "[OK] Synced ${{ steps.check.outputs.merge_base }}..${{ steps.check.outputs.upstream_head }} directly to main."

      - name: Open PR (conflicts OR gate failure OR force_pr)
        if: |
          steps.check.outputs.has_changes == 'true' &&
          (steps.merge.outputs.conflicts == 'true' ||
           steps.build.outputs.passed == 'false' ||
           steps.test.outputs.passed == 'false' ||
           github.event.inputs.force_pr == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=""
          [ "${{ steps.merge.outputs.conflicts }}" = "true" ] && STATUS="${STATUS}- [!] Merge conflicts in: ${CONFLICT_FILES:-see diff}\n"
          [ "${{ steps.build.outputs.passed }}" = "false" ] && STATUS="${STATUS}- [!] \`go build\` FAILED\n"
          [ "${{ steps.test.outputs.passed }}" = "false" ] && STATUS="${STATUS}- [!] \`go test\` FAILED\n"
          [ -z "${STATUS}" ] && STATUS="- [OK] Clean merge + gates green (force_pr requested)\n"
          BODY=$(printf "## Upstream sync: \`router-for-me/CLIProxyAPI\` → \`main\`\n\nCommits being synced: \`${{ steps.check.outputs.merge_base }}..${{ steps.check.outputs.upstream_head }}\`\n\n### Gate status\n%b\n### What to do\n1. Review the diff — especially \`cmd/server/main.go\`, \`go.mod\`, \`go.sum\`.\n2. Resolve any conflicts; plus-only provider dirs are protected by \`.gitattributes merge=ours\`.\n3. Re-run failing gates locally: \`go build ./... && go test ./...\`.\n4. Merge when green.\n" "${STATUS}")
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "chore(upstream-sync): $(date -u +%Y-%m-%d) pull from router-for-me/CLIProxyAPI" \
            --body "${BODY}" \
            --label "upstream-sync"
