name: Upstream Sync

# Polls release tags from kaitranntt/CLIProxyAPIPlus and merges the newest
# upstream tag into this fork. Successful syncs are tagged as:
#   vX.Y.Z-unstableneutron.<github-run-number>
#   vX.Y.Z-prerelease.unstableneutron.<github-run-number>
# Examples:
#   v7.1.21       -> v7.1.21-unstableneutron.123
#   v7.1.15-1     -> v7.1.15-1.unstableneutron.123
#
# Outcomes:
#   1. Clean merge + build + test pass -> fast-forward main, create fork tag,
#      and dispatch release/docker workflows.
#   2. Conflicts or gate failures -> push a sync branch and open/update a
#      SINGLE tracking issue (label: upstream-sync-blocked).
#   3. workflow_dispatch with force_pr=true -> open a PR for manual review.

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Always open a PR instead of fast-forwarding/tagging'
        required: false
        default: 'false'
      force_rebuild:
        description: 'Create a new unstableneutron run-number tag even if the latest upstream tag is already synced'
        required: false
        default: 'false'

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRACKING_ISSUE_LABEL: upstream-sync-blocked
  PR_LABEL: upstream-sync
  UPSTREAM_REPOSITORY: kaitranntt/CLIProxyAPIPlus

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "ccs-upstream-sync[bot]"
          git config user.email "ccs-upstream-sync@users.noreply.github.com"

      - name: Supersede prior sync PRs and stale branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --search 'in:title upstream-sync' \
            --json number,headRefName \
            --jq '.[] | "\(.number) \(.headRefName)"' || true)
          if [ -n "${OPEN_PRS}" ]; then
            echo "${OPEN_PRS}" | while read -r NUM BRANCH; do
              [ -z "${NUM}" ] && continue
              echo "[i] Superseding PR #${NUM} (branch ${BRANCH})"
              gh pr close "${NUM}" --repo "${{ github.repository }}" \
                --comment "Superseded by upcoming upstream-sync run." || true
              if [ -n "${BRANCH}" ]; then
                git push origin --delete "${BRANCH}" 2>/dev/null || true
              fi
            done
          fi

          git ls-remote --heads origin 'upstream-sync/*' \
            | awk '{print $2}' \
            | sed 's|refs/heads/||' \
            | while read -r BR; do
                [ -z "${BR}" ] && continue
                echo "[i] Pruning orphan branch ${BR}"
                git push origin --delete "${BR}" 2>/dev/null || true
              done
          set -e

      - name: Add upstream remote
        run: git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"

      - name: Fetch upstream main
        run: git fetch --no-tags upstream main

      - name: Select upstream release tag
        id: check
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          set -euo pipefail

          UPSTREAM_TAG=$(git ls-remote --tags --refs upstream 'v*' \
            | awk '{ sub("refs/tags/", "", $2); print $2 }' \
            | grep -Ev -- '[-.]unstableneutron\.[0-9]+$' \
            | sort -V \
            | tail -n 1 || true)

          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          if [ -z "${UPSTREAM_TAG}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "[i] No upstream v* release tags found."
            exit 0
          fi

          git fetch --no-tags upstream "refs/tags/${UPSTREAM_TAG}"
          UPSTREAM_COMMIT=$(git rev-list -n 1 FETCH_HEAD)
          UPSTREAM_MAIN=$(git rev-parse upstream/main)
          LOCAL=$(git rev-parse HEAD)
          MERGE_BASE=$(git merge-base HEAD "${UPSTREAM_COMMIT}" || echo "none")
          SAFE_TAG=$(printf '%s' "${UPSTREAM_TAG}" | tr -c 'A-Za-z0-9._-' '-')

          if [[ "${UPSTREAM_TAG}" == *-* ]]; then
            FORK_TAG_PREFIX="${UPSTREAM_TAG}.unstableneutron"
          else
            FORK_TAG_PREFIX="${UPSTREAM_TAG}-unstableneutron"
          fi
          FORK_TAGS=$(git ls-remote --tags --refs origin "${FORK_TAG_PREFIX}.[0-9]*" \
            | awk '{ sub("refs/tags/", "", $2); print $2 }' \
            || true)
          LATEST_FORK_TAG=$(printf '%s\n' "${FORK_TAGS}" | awk 'NF' | sort -V | tail -n 1 || true)
          LATEST_FORK_SUFFIX=$(printf '%s\n' "${FORK_TAGS}" \
            | awk -v prefix="${FORK_TAG_PREFIX}." '
                index($0, prefix) == 1 {
                  suffix = substr($0, length(prefix) + 1)
                  if (suffix ~ /^[0-9]+$/) {
                    if (!found || suffix + 0 > max) max = suffix + 0
                    found = 1
                  }
                }
                END { if (found) print max }
              ')
          if [ -n "${LATEST_FORK_SUFFIX}" ]; then
            NEXT_FORK_SUFFIX=$((LATEST_FORK_SUFFIX + 1))
          else
            NEXT_FORK_SUFFIX=0
          fi
          NEXT_FORK_TAG="${FORK_TAG_PREFIX}.${NEXT_FORK_SUFFIX}"
          if [ -n "${LATEST_FORK_TAG}" ]; then
            git fetch --no-tags origin "refs/tags/${LATEST_FORK_TAG}"
          fi

          {
            echo "local=${LOCAL}"
            echo "upstream_head=${UPSTREAM_COMMIT}"
            echo "upstream_main=${UPSTREAM_MAIN}"
            echo "merge_base=${MERGE_BASE}"
            echo "safe_tag=${SAFE_TAG}"
            echo "latest_fork_tag=${LATEST_FORK_TAG}"
            echo "latest_fork_suffix=${LATEST_FORK_SUFFIX}"
            echo "next_fork_tag=${NEXT_FORK_TAG}"
          } >> "$GITHUB_OUTPUT"

          if [ "${FORCE_REBUILD:-false}" != "true" ] && [ -n "${LATEST_FORK_TAG}" ]; then
            LATEST_FORK_COMMIT=$(git rev-list -n 1 "${LATEST_FORK_TAG}")
            if git merge-base --is-ancestor "${LATEST_FORK_COMMIT}" HEAD; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "[i] ${UPSTREAM_TAG} is already represented by ${LATEST_FORK_TAG} on main."
              exit 0
            fi
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "[i] Selected upstream tag ${UPSTREAM_TAG} (${UPSTREAM_COMMIT}); next fork tag ${NEXT_FORK_TAG}."

      - name: Close stale tracking issue when latest upstream tag is synced
        if: steps.check.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OPEN_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "${TRACKING_ISSUE_LABEL}" \
            --json number \
            --jq '.[].number' || true)
          for n in ${OPEN_ISSUES}; do
            echo "[i] Closing stale tracking issue #${n}."
            gh issue close "${n}" --repo "${{ github.repository }}" \
              --comment "Latest upstream tag is already synced. Auto-closing." || true
          done
          set -e

      - name: Create sync branch
        if: steps.check.outputs.has_changes == 'true'
        id: branch
        run: |
          BRANCH="upstream-sync/${{ steps.check.outputs.safe_tag }}"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          git checkout -b "${BRANCH}"

      - name: Merge upstream tag (prefer upstream, respect .gitattributes merge=ours)
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        run: |
          set +e
          git merge --no-edit -X theirs "${{ steps.check.outputs.upstream_head }}"
          MERGE_EXIT=$?
          set -e

          UNMERGED=$(git ls-files -u | awk '{print $4}' | sort -u || true)
          if [ -z "$UNMERGED" ] && [ $MERGE_EXIT -eq 0 ]; then
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
            echo "[OK] Clean merge, no conflicts."
            exit 0
          fi

          echo "conflicts=true" >> "$GITHUB_OUTPUT"
          {
            echo 'CONFLICT_FILES<<EOF'
            echo "$UNMERGED"
            echo 'EOF'
          } >> "$GITHUB_ENV"

          if [ -z "$UNMERGED" ]; then
            echo "[!] Merge failed without unmerged paths; leaving branch for inspection."
            exit 0
          fi

          echo "[!] Conflicts detected; auto-resolving with upstream side:"
          echo "$UNMERGED"
          echo "$UNMERGED" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            if git cat-file -e "${{ steps.check.outputs.upstream_head }}:$f" 2>/dev/null; then
              git checkout --theirs -- "$f" 2>/dev/null || true
            else
              git rm -f --ignore-unmatch "$f" || true
            fi
            git add -- "$f" 2>/dev/null || true
          done

          git commit \
            -m "chore(upstream-sync): merge ${{ steps.check.outputs.upstream_tag }}" \
            -m "Auto-resolved conflicts by preferring upstream files where .gitattributes did not already select the fork side."
          echo "[OK] Conflicts auto-resolved; proceeding to validation gates."

      - name: Set up Go
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Record synced upstream version
        if: steps.check.outputs.has_changes == 'true'
        run: |
          {
            echo "UPSTREAM_REPOSITORY=${UPSTREAM_REPOSITORY}"
            echo "UPSTREAM_TAG=${{ steps.check.outputs.upstream_tag }}"
            echo "UPSTREAM_COMMIT=${{ steps.check.outputs.upstream_head }}"
          } > .ccs-fork-upstream.env
          git add .ccs-fork-upstream.env
          git diff --cached --quiet || git commit -m "chore(upstream-sync): record upstream version"

      - name: Build gate
        if: steps.check.outputs.has_changes == 'true'
        id: build
        continue-on-error: true
        run: |
          set +e
          BUILD_LOG=$(mktemp)
          go build -o test-output ./cmd/server 2>&1 | tee "${BUILD_LOG}"
          BUILD_EXIT=${PIPESTATUS[0]}
          rm -f test-output
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'BUILD_TAIL<<EOF'
            tail -n 60 "${BUILD_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Test gate
        if: steps.check.outputs.has_changes == 'true' && steps.build.outputs.passed == 'true'
        id: test
        continue-on-error: true
        run: |
          set +e
          TEST_LOG=$(mktemp)
          go test ./... -count=1 -timeout 10m 2>&1 | tee "${TEST_LOG}"
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'TEST_TAIL<<EOF'
            tail -n 60 "${TEST_LOG}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          set -e

      - name: Push sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: git push --force-with-lease origin "${{ steps.branch.outputs.name }}"

      - name: Fast-forward main and tag fork release
        id: ffwd
        if: |
          steps.check.outputs.has_changes == 'true' &&
          steps.merge.outputs.conflicts == 'false' &&
          steps.build.outputs.passed == 'true' &&
          steps.test.outputs.passed == 'true' &&
          github.event.inputs.force_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORK_TAG="${{ steps.check.outputs.next_fork_tag }}"
          git checkout main
          git merge --ff-only "${{ steps.branch.outputs.name }}"
          git push origin main
          git push origin --delete "${{ steps.branch.outputs.name }}" || true

          git tag -a "${FORK_TAG}" -m "CLIProxyAPIPlus ${FORK_TAG} (upstream ${{ steps.check.outputs.upstream_tag }})"
          git push origin "refs/tags/${FORK_TAG}"

          gh workflow run release.yaml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${FORK_TAG}" || true
          gh workflow run docker-image.yml --repo "${GITHUB_REPOSITORY}" --ref main -f tag="${FORK_TAG}" || true

          echo "fork_tag=${FORK_TAG}" >> "$GITHUB_OUTPUT"
          echo "did_ff=true" >> "$GITHUB_OUTPUT"
          echo "[OK] Synced ${{ steps.check.outputs.upstream_tag }} and created ${FORK_TAG}."

      - name: Close stale tracking issue (fast-forward succeeded)
        if: steps.ffwd.outputs.did_ff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OPEN_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "${TRACKING_ISSUE_LABEL}" \
            --json number \
            --jq '.[].number' || true)
          for n in ${OPEN_ISSUES}; do
            gh issue close "${n}" --repo "${{ github.repository }}" \
              --comment "Resolved by automated sync to ${{ steps.check.outputs.upstream_tag }} as ${{ steps.ffwd.outputs.fork_tag }}." || true
          done
          set -e

      - name: Open PR (force_pr only — manual escape hatch)
        if: |
          steps.check.outputs.has_changes == 'true' &&
          github.event.inputs.force_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="chore(upstream-sync): sync ${{ steps.check.outputs.upstream_tag }} from ${UPSTREAM_REPOSITORY}"
          BODY=$(printf "## Upstream sync (force_pr)\n\n- Upstream repository: \`%s\`\n- Upstream tag: \`%s\`\n- Upstream commit: \`%s\`\n- Next fork tag after merge: \`%s\`\n\nManually requested via workflow_dispatch.\n" \
            "${UPSTREAM_REPOSITORY}" \
            "${{ steps.check.outputs.upstream_tag }}" \
            "${{ steps.check.outputs.upstream_head }}" \
            "${{ steps.check.outputs.next_fork_tag }}")
          set +e
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "${TITLE}" \
            --body "${BODY}" 2>&1)
          PR_EXIT=$?
          set -e
          echo "${PR_URL}"
          if [ $PR_EXIT -ne 0 ]; then exit $PR_EXIT; fi
          PR_NUM=$(echo "${PR_URL}" | grep -oE '/pull/[0-9]+' | grep -oE '[0-9]+$' || true)
          if [ -n "${PR_NUM}" ]; then
            gh pr edit "${PR_NUM}" --add-label "${PR_LABEL}" 2>&1 || true
          fi

      - name: Update tracking issue on conflicts or gate failure
        if: |
          steps.check.outputs.has_changes == 'true' &&
          github.event.inputs.force_pr != 'true' &&
          (steps.merge.outputs.conflicts == 'true' ||
           steps.build.outputs.passed == 'false' ||
           steps.test.outputs.passed == 'false')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          STATUS=""
          [ "${{ steps.merge.outputs.conflicts }}" = "true" ] && STATUS="${STATUS}- :warning: Auto-resolved or unresolved conflicts in: \`${CONFLICT_FILES:-(see diff)}\`\n"
          [ "${{ steps.build.outputs.passed }}" = "false" ] && STATUS="${STATUS}- :x: \`go build -o test-output ./cmd/server\` FAILED\n"
          [ "${{ steps.test.outputs.passed }}" = "false" ] && STATUS="${STATUS}- :x: \`go test ./...\` FAILED\n"

          BRANCH="${{ steps.branch.outputs.name }}"
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
          UPSTREAM_COMMIT="${{ steps.check.outputs.upstream_head }}"
          NEXT_FORK_TAG="${{ steps.check.outputs.next_fork_tag }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH_URL="${{ github.server_url }}/${{ github.repository }}/tree/${BRANCH}"

          gh label create "${TRACKING_ISSUE_LABEL}" \
            --color "B60205" \
            --description "Automated upstream sync is blocked; needs maintainer attention." \
            --repo "${{ github.repository }}" 2>/dev/null || true

          ISSUE_NUM=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "${TRACKING_ISSUE_LABEL}" \
            --json number \
            --jq '.[0].number' || true)

          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          COMMENT_BODY=$(printf '**New blocked sync attempt** (%s)\n\n- Upstream repository: `%s`\n- Upstream tag: `%s`\n- Upstream commit: `%s`\n- Intended fork tag: `%s`\n- Sync branch: [%s](%s)\n- Workflow run: %s\n\n### Gate status\n%b\n<details><summary>Build tail (last 60 lines)</summary>\n\n```\n%s\n```\n\n</details>\n\n<details><summary>Test tail (last 60 lines)</summary>\n\n```\n%s\n```\n\n</details>\n' \
            "${NOW}" \
            "${UPSTREAM_REPOSITORY}" \
            "${UPSTREAM_TAG}" \
            "${UPSTREAM_COMMIT}" \
            "${NEXT_FORK_TAG}" \
            "${BRANCH}" "${BRANCH_URL}" \
            "${RUN_URL}" \
            "${STATUS}" \
            "${BUILD_TAIL:-<no build log captured>}" \
            "${TEST_TAIL:-<no test log captured>}")

          if [ -n "${ISSUE_NUM}" ]; then
            echo "[i] Updating existing tracking issue #${ISSUE_NUM}"
            gh issue comment "${ISSUE_NUM}" \
              --repo "${{ github.repository }}" \
              --body "${COMMENT_BODY}" || exit 1
          else
            echo "[i] Creating new tracking issue"
            ISSUE_TITLE="upstream-sync blocked: ${{ steps.check.outputs.upstream_tag }} needs maintainer attention"
            INTRO=$(printf 'The automated upstream sync from `%s` cannot land cleanly. This issue tracks the blocked state. **It will be auto-closed** once a sync run reaches `main` without intervention.\n\nEach subsequent failed run will append a comment with the latest failing tag and gate output. **No new PRs or issues are spawned** — this is the single source of truth.\n\n### What to do\n1. Pull the latest sync branch listed in the most recent comment.\n2. Reproduce locally: `go build -o test-output ./cmd/server && rm test-output && go test ./...`.\n3. Patch fork-specific files to track upstream API changes.\n4. Push the fix to `main`. The next scheduled run will close this issue.\n\n---\n' "${UPSTREAM_REPOSITORY}")
            ISSUE_BODY="${INTRO}${COMMENT_BODY}"
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${ISSUE_TITLE}" \
              --label "${TRACKING_ISSUE_LABEL}" \
              --assignee "${{ github.repository_owner }}" \
              --body "${ISSUE_BODY}" || exit 1
          fi
          set -e
